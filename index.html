<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is Philip's Internet Down?</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
        }
        #display {
            font-size: 10rem;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="display">...</div>

    <script>
        // Coordinates for San Francisco
        const lat = 37.7749;
        const lon = -122.4194;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=fahrenheit`;

        async function checkTemperature() {
            try {
                const response = await fetch(url);
                const data = await response.json();
                const temp = data.current_weather.temperature;

                const is_between = (opening, closing) => {
                    const time = new Date().toLocaleTimeString('en-US', {
                        timeZone: 'America/Los_Angeles',
                        hour12: false,
                        hour: 'numeric'
                    });

                    let hour = parseInt(time);

                    return closing >= hour && hour >= opening;
                };

                const display = document.getElementById('display');
                display.title = 'It\'s ${temp} F'

                if (temp > 90) {
                    display.innerText = "YES";
                    display.style.color = "#e63946"; // Red for hot
                } else if (temp > 75 && is_between(8, 15)) {
                    display.innerText = "Soon...";
                    display.style.color = "#ffb703"; // Yellow for hot-ish
                } else {
                    display.innerText = "NO";
                    display.style.color = "#457b9d"; // Blue for cool
                }
            } catch (error) {
                document.getElementById('display').innerText = "ERROR";
                console.error("Failed to fetch weather data:", error);
            }
        }

        checkTemperature();
    </script>
</body>
</html>
